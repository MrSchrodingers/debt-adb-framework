global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "dispatch"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:7890"]
        labels:
          instance: "dispatch-core"
    # S13: /metrics now requires API key authentication
    headers:
      X-API-Key: "${DISPATCH_API_KEY}"
